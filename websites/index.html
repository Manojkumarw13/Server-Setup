<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio — Coming Soon" />
    <title>Portfolio</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          "Inter",
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #0a0a0f;
        color: #e4e4e7;
        overflow: hidden;
      }

      .container {
        text-align: center;
        position: relative;
        z-index: 1;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.75rem;
      }

      p {
        font-size: 1.125rem;
        color: #71717a;
        font-weight: 400;
      }

      .glow {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        pointer-events: none;
      }

      .glow-1 {
        background: #6366f1;
        top: -100px;
        right: -100px;
      }

      .glow-2 {
        background: #a78bfa;
        bottom: -100px;
        left: -100px;
      }
    </style>
  </head>
  <body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="container">
      <h1>Coming Soon</h1>
      <p>Portfolio is under construction.</p>
    </div>
  </body>
</html>
